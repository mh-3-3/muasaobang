<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your wishes will come true</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: radial-gradient(circle at bottom, #001a33, #000);
      height: 100vh;
      width: 100vw;
      position: relative;
      font-family: sans-serif;
    }

    canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: block;
    }

    #overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      backdrop-filter: blur(10px);
      background: rgba(0,0,0,0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
      transition: backdrop-filter 2s ease, background 2s ease;
      font-size: 5vw;
    }

    #startButton {
      --btn-size: 8vmax;
      width: var(--btn-size);
      height: var(--btn-size);
      border-radius: 5%;
      background: black;
      border: 2px solid white;
      color: white;
      font-size: 1.2vmax;
      cursor: pointer;
      text-align: center;
    }

    #textBox {
      position: absolute;
      bottom: 5%;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.7);
      padding: 1em 2em;
      border-radius: 10px;
      color: white;
      font-size: 5vmin;
      white-space: nowrap;
      opacity: 0;
      transition: opacity 1s ease;
    }
  </style>
</head>
<body>
  <canvas id="sky"></canvas>
  
  <div id="overlay">
    <button id="startButton">Công chúa bấm vô đây nhó</button>
  </div>

  <div id="textBox"></div>

  <audio id="bgm" src="noinaycoanhgiaohuong.mp3"></audio>

  <script>
    const canvas = document.getElementById('sky');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    class Meteor {
      constructor() {
        this.reset();
      }

      reset() {
        this.x = Math.random() * canvas.width * 1.5;
        this.y = Math.random() * -canvas.height;
        this.length = Math.random() * 80 + 50;
        this.speed = (Math.random() * 6 + 4) *1.3; // 2/3 tốc độ trước
        this.size = 2;
        this.opacity = 1;
      }

      update() {
        this.x -= this.speed; // di chuyển chéo xuống trái
        this.y += this.speed;
        this.opacity -= 0.01;
        if (this.y > canvas.height || this.x < -this.length || this.opacity <= 0) {
          this.reset();
        }
      }

      draw() {
        const gradient = ctx.createLinearGradient(this.x, this.y, this.x + this.length * Math.cos(Math.PI * 0.75), this.y - this.length * Math.sin(Math.PI * 0.75));
        gradient.addColorStop(0, `rgba(255,255,255,${this.opacity})`);
        gradient.addColorStop(1, 'rgba(255,255,255,0)');

        ctx.beginPath();
        ctx.strokeStyle = gradient;
        ctx.lineWidth = this.size;
        ctx.moveTo(this.x, this.y);
        ctx.lineTo(this.x + this.length * Math.cos(Math.PI * -0.25), this.y + this.length * Math.sin(Math.PI * -0.25));
        ctx.stroke();
      }
    }

    let meteors = [];
    for (let i = 0; i < 60; i++) {
      meteors.push(new Meteor());
    }

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      meteors.forEach(meteor => {
        meteor.update();
        meteor.draw();
      });
      requestAnimationFrame(animate);
    }

    animate();

    // Button and overlay logic
    const overlay = document.getElementById('overlay');
    const startButton = document.getElementById('startButton');
    const bgm = document.getElementById('bgm');
    const textBox = document.getElementById('textBox');

    const messages = [
      "Chào công chúa!","Em mới tạo mưa sao băng cho công chúa nè",
      "Hãy nghĩ tới điều chị mong muốn nhất nhé",
      "Mong điều ước của chị thành sự thật!"
    ];

    let msgIndex = 0;

    startButton.addEventListener('click', () => {
      overlay.style.backdropFilter = 'blur(0px)';
      overlay.style.background = 'rgba(0,0,0,0)';
      startButton.style.opacity = 0;
      setTimeout(() => overlay.style.display = 'none', 2000);
      bgm.play();

      showMessages();
    });

    function showMessages() {
  textBox.style.opacity = 1;
  typeMessage(messages[msgIndex], () => {
    msgIndex++;
    if (msgIndex < messages.length) {  // <-- chỉ chạy tiếp nếu chưa hết
      setTimeout(showMessages, 1500);
    }
  });
}


    function typeMessage(message, callback) {
      textBox.textContent = '';
      let i = 0;
      const interval = setInterval(() => {
        textBox.textContent += message[i];
        i++;
        if (i >= message.length) {
          clearInterval(interval);
          if (callback) callback();
        }
      }, 100);
    }

    window.addEventListener('resize', () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    });
  </script>
</body>
</html>sss
